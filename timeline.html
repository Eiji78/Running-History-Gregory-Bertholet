<html lang="fr">
<head>

<title>Timeline — Gregory Bertholet · Historique Courses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow+Condensed:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
    --neon-cyan:   #00fff9;
    --neon-purple: #bc13fe;
    --neon-pink:   #ff006e;
    --neon-orange: #ff6b35;
    --neon-green:  #00ff88;
    --neon-gold:   #ffd700;
    --bg:          #07070e;
    --c10k:        rgba(0,210,120,1);
    --csemi:       rgba(0,180,255,1);
    --ctrail:      rgba(255,165,0,1);
    --cmar:        rgba(200,80,255,1);
    --cvirt:       rgba(120,120,120,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* ── Animated background ── */
.animated-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(188,19,254,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 75%, rgba(0,255,249,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 55% 45%, rgba(255,107,53,0.06) 0%, transparent 55%);
    animation: bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(25deg); }
}
.grain {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.neon-border {
    position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 100;
    background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan), var(--neon-pink), var(--neon-orange), var(--neon-cyan));
    background-size: 300% 100%;
    animation: borderSlide 4s linear infinite;
}
@keyframes borderSlide { to { background-position: 300% 0; } }

/* ── Nav ── */
.site-nav {
    display: flex; flex-wrap: nowrap; justify-content: center;
    gap: 0.45rem; margin-bottom: 2.5rem;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding: 0.25rem 0.5rem;
}
.site-nav::-webkit-scrollbar { display: none; }
.site-nav a {
    flex-shrink: 0; display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.38rem 0.75rem; border-radius: 10px;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
    text-decoration: none; border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.75);
    transition: all 0.2s; white-space: nowrap;
}
.site-nav a:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); color: #fff; }
.site-nav a.active { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,255,249,0.1); box-shadow: 0 0 12px rgba(0,255,249,0.25); }
@media (max-width: 600px) { .site-nav { justify-content: flex-start; padding: 0.25rem 1rem; } }

/* ── Wrapper ── */
.wrapper {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 3.5rem 1.5rem 5rem;
}

/* ── Header ── */
.page-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    font-weight: 900; letter-spacing: 0.06em;
    background: linear-gradient(135deg, #ff2244, #ff6b35);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 18px rgba(255,34,68,0.7)) drop-shadow(0 0 40px rgba(255,107,53,0.4));
    text-align: center; display: block; margin-bottom: 0.4rem;
}
.page-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem; font-weight: 300; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.35); text-align: center;
    margin-bottom: 2.5rem;
}

/* ── Filters ── */
.filters {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    justify-content: center; margin-bottom: 2.5rem;
}
.filter-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
    padding: 0.3rem 0.85rem; border-radius: 20px; cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5);
    transition: all 0.2s;
}
.filter-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
.filter-btn.active { color: #fff; }
.filter-btn[data-dist="all"].active  { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); }
.filter-btn[data-dist="10k"].active  { border-color: var(--c10k);   background: rgba(0,210,120,0.15);   color: var(--c10k); }
.filter-btn[data-dist="semi"].active { border-color: var(--csemi);  background: rgba(0,180,255,0.15);   color: var(--csemi); }
.filter-btn[data-dist="trail"].active{ border-color: var(--ctrail); background: rgba(255,165,0,0.15);   color: var(--ctrail); }
.filter-btn[data-dist="mar"].active  { border-color: var(--cmar);   background: rgba(200,80,255,0.15);  color: var(--cmar); }
.filter-btn[data-dist="pr"].active   { border-color: var(--neon-gold); background: rgba(255,215,0,0.15); color: var(--neon-gold); }

/* ── Year pill ── */
.year-marker {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 1rem;
    margin: 2.5rem 0 1.2rem;
}
.year-marker::before {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.12));
}
.year-marker::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(to left, transparent, rgba(255,255,255,0.12));
}
.year-pill {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em;
    padding: 0.25rem 1rem; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.4);
    flex-shrink: 0;
}

/* ── Timeline axis ── */
.timeline {
    position: relative;
    padding-left: 28px;
}
.timeline::before {
    content: '';
    position: absolute; left: 7px; top: 0; bottom: 0; width: 2px;
    background: linear-gradient(to bottom,
        transparent 0%,
        rgba(255,255,255,0.08) 5%,
        rgba(255,255,255,0.08) 95%,
        transparent 100%);
}

/* ── Race card ── */
.race-item {
    position: relative;
    margin-bottom: 0.9rem;
    opacity: 0;
    transform: translateX(-16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
}
.race-item.visible {
    opacity: 1;
    transform: translateX(0);
}
.race-item.hidden-filter {
    display: none;
}

/* Dot on the axis */
.race-dot {
    position: absolute;
    left: -24px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid;
    background: var(--bg);
    transition: all 0.2s;
    z-index: 2;
    flex-shrink: 0;
}
.race-item:hover .race-dot {
    transform: translateY(-50%) scale(1.4);
    box-shadow: 0 0 10px currentColor;
}

/* PR star on dot */
.race-dot.is-pr::after {
    content: '★';
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: var(--neon-gold);
    filter: drop-shadow(0 0 3px var(--neon-gold));
}

.race-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
}
.race-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; border-radius: 3px 0 0 3px;
    background: var(--dist-color);
    transition: width 0.2s;
}
.race-card:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.18);
    transform: translateX(4px);
}
.race-card:hover::before { width: 5px; }
.race-card.pr-card {
    border-color: rgba(255,215,0,0.2);
    background: rgba(255,215,0,0.04);
}
/* PR badge now inline in stats row */
.pr-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem; font-weight: 700; letter-spacing: 0.1em;
    color: var(--neon-gold);
    border: 1px solid rgba(255,215,0,0.4);
    padding: 2px 6px; border-radius: 4px;
    background: rgba(255,215,0,0.1);
    align-self: center;
}

/* Card header row */
.card-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 0.5rem;
    margin-bottom: 0.35rem;
}
.card-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 400; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.3); white-space: nowrap; flex-shrink: 0;
    margin-top: 2px;
}
.card-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 600; letter-spacing: 0.03em;
    color: rgba(255,255,255,0.88); line-height: 1.2;
    flex: 1;
}
.card-name .city {
    font-size: 0.7rem; font-weight: 400;
    color: rgba(255,255,255,0.35); margin-left: 0.3rem;
}

/* Card stats row */
.card-stats {
    display: flex; flex-wrap: wrap; gap: 0.4rem 0.8rem;
    align-items: center;
}
.stat-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
    color: rgba(255,255,255,0.45);
    display: flex; align-items: center; gap: 0.25rem;
}
.stat-chip .val {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem; font-weight: 700;
    color: rgba(255,255,255,0.85);
}
.stat-chip.perf .val {
    font-size: 0.85rem;
    color: var(--dist-color);
    filter: brightness(1.1);
}

/* ── Expanded card detail (click to open) ── */
.card-detail {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    opacity: 0;
}
.race-card.expanded .card-detail {
    max-height: 200px; opacity: 1;
}
.card-detail-inner {
    border-top: 1px solid rgba(255,255,255,0.07);
    margin-top: 0.6rem; padding-top: 0.6rem;
    display: flex; flex-wrap: wrap; gap: 0.5rem 1.5rem;
}
.detail-row {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem; color: rgba(255,255,255,0.4);
    display: flex; align-items: center; gap: 0.3rem;
}
.detail-row span { color: rgba(255,255,255,0.75); font-weight: 600; }
.detail-actions {
    display: flex; gap: 0.5rem; margin-top: 0.4rem; width: 100%;
}
.detail-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
    padding: 0.25rem 0.7rem; border-radius: 6px; cursor: pointer;
    text-decoration: none; transition: all 0.15s;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6);
}
.detail-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
.detail-btn.strava { border-color: rgba(252,76,2,0.4); color: rgba(252,76,2,0.9); }
.detail-btn.strava:hover { background: rgba(252,76,2,0.15); }
.detail-btn.bib { border-color: rgba(0,255,249,0.35); color: var(--neon-cyan); }
.detail-btn.bib:hover { background: rgba(0,255,249,0.1); }

/* ── Summary bar ── */
.summary-bar {
    display: flex; flex-wrap: wrap; gap: 1rem 2rem;
    justify-content: center;
    padding: 1rem 1.5rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    margin-bottom: 2rem;
}
.sum-item {
    text-align: center;
}
.sum-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, #ff2244, #ff6b35);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px rgba(255,34,68,0.5));
}
.sum-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.6rem; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3); margin-top: 2px;
}

/* ── Legend ── */
.legend {
    display: flex; flex-wrap: wrap; gap: 0.5rem 1.2rem;
    justify-content: center; margin-bottom: 2rem;
}
.legend-item {
    display: flex; align-items: center; gap: 0.3rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em;
    color: rgba(255,255,255,0.4);
}
.legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 2px solid;
}

/* ── Confetti particle ── */
.confetti-particle {
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
}
@keyframes confetti-fall {
    0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.4); opacity: 0; }
}

/* ── No results ── */
.no-results {
    text-align: center; padding: 3rem 0;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.2);
    display: none;
}

@media (max-width: 480px) {
    .wrapper { padding: 2.5rem 1rem 4rem; }
    .card-name { font-size: 0.88rem; }
    .stat-chip.perf .val { font-size: 0.76rem; }
    .page-title { font-size: 1.5rem !important; }
}
</style>
</head>

// ── Helpers ──────────────────────────────────────────────────────────────────
function distCat(km) {
    const k = parseFloat(km);
    if (k >= 40) return 'mar';
    if (k >= 18) return 'semi';
    if (k >= 9 && k <= 13) return '10k';
    if (k < 9)  return '10k';  // virtual 5k
    return 'trail';
}
function distColor(cat) {
    return { '10k':'var(--c10k)', semi:'var(--csemi)', trail:'var(--ctrail)', mar:'var(--cmar)', virt:'var(--cvirt)' }[cat] || 'rgba(255,255,255,0.4)';
}
function distLabel(cat) {
    return { '10k':'10K', semi:'SEMI', trail:'TRAIL', mar:'MARATHON' }[cat] || '?';
}
function fmtDate(d) {
    const p = d.split('-');
    const months = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
    return `${parseInt(p[2])} ${months[parseInt(p[1])-1]} ${p[0]}`;
}
function fmtPerf(p) {
    // Remove leading zeros: 01:25:52 → 1h25'52" / 00:38:18 → 38'18"
    const parts = p.split(':');
    const h = parseInt(parts[0]), m = parseInt(parts[1]), s = parseInt(parts[2]);
    if (h > 0) return `${h}h${String(m).padStart(2,'0')}'${String(s).padStart(2,'0')}"`;
    return `${m}'${String(s).padStart(2,'0')}"`;
}
function pctClass(classement) {
    const parts = classement.split('/');
    if (parts.length < 2) return null;
    return (parseInt(parts[0]) / parseInt(parts[1]) * 100).toFixed(1);
}

// ── Sort races oldest → newest ──
const sorted = [...racesData].sort((a, b) => a.date.localeCompare(b.date));

// ── Build summary ──
const totalKm = sorted.reduce((s, r) => s + parseFloat(r.km), 0);
const totalPR = sorted.filter(r => r.record).length;
const years = new Set(sorted.map(r => r.date.slice(0,4))).size;
document.getElementById('sum-km').textContent = Math.round(totalKm).toLocaleString('fr-FR') + ' km';
document.getElementById('sum-pr').textContent = totalPR;
document.getElementById('sum-years').textContent = years;

// ── Render timeline ──
function render(activeFilter) {
    const root = document.getElementById('timeline-root');
    root.innerHTML = '';

    const filtered = activeFilter === 'all' ? sorted
        : activeFilter === 'pr' ? sorted.filter(r => r.record)
        : sorted.filter(r => distCat(r.km) === activeFilter);

    // Update summary count
    document.getElementById('sum-count').textContent = filtered.length;

    if (filtered.length === 0) {
        document.getElementById('no-results').style.display = 'block';
        return;
    }
    document.getElementById('no-results').style.display = 'none';

    // Group by year
    let currentYear = null;
    let timelineDiv = null;

    filtered.forEach((race, idx) => {
        const year = race.date.slice(0, 4);
        const cat  = distCat(race.km);
        const color = distColor(cat);
        const isPR = !!race.record;
        const bib  = BIB_NUMS[race.date];
        const pct  = pctClass(race.classement);

        // Year separator
        if (year !== currentYear) {
            currentYear = year;
            const ym = document.createElement('div');
            ym.className = 'year-marker';
            ym.innerHTML = `<div class="year-pill">${year}</div>`;
            root.appendChild(ym);

            timelineDiv = document.createElement('div');
            timelineDiv.className = 'timeline';
            root.appendChild(timelineDiv);
        }

        // Race item
        const item = document.createElement('div');
        item.className = 'race-item';
        item.dataset.cat = cat;
        item.dataset.pr = isPR ? '1' : '0';
        item.style.setProperty('--dist-color', color);

        // Dot
        const dot = document.createElement('div');
        dot.className = 'race-dot' + (isPR ? ' is-pr' : '');
        dot.style.borderColor = color;
        dot.style.color = color;
        item.appendChild(dot);

        // Card
        const card = document.createElement('div');
        card.className = 'race-card' + (isPR ? ' pr-card' : '');
        card.style.setProperty('--dist-color', color);

        card.innerHTML = `
            <div class="card-top">
                <div class="card-name">
                    ${race.course}
                    <span class="city">${race.ville}</span>
                </div>
                <div class="card-date">${fmtDate(race.date)}</div>
            </div>
            <div class="card-stats">
                <div class="stat-chip perf">
                    <span class="val">${fmtPerf(race.perf)}</span>
                </div>
                <div class="stat-chip">
                    <span>${parseFloat(race.km) % 1 === 0 ? parseFloat(race.km) : race.km} km</span>
                </div>
                <div class="stat-chip">
                    <span class="val">${race.tempsMoyenKm}</span><span>/km</span>
                </div>
                ${pct ? `<div class="stat-chip"><span class="val">${pct}%</span></div>` : ''}
                ${isPR ? '<div class="pr-badge">PR</div>' : ''}
            </div>
            <div class="card-detail">
                <div class="card-detail-inner">
                    <div class="detail-row">🏁 Classement : <span>${race.classement}</span></div>
                    <div class="detail-row">📏 Distance : <span>${race.km} km (${distLabel(cat)})</span></div>
                    ${race.fc ? `<div class="detail-row">❤️ FC moy. : <span>${race.fc} bpm</span></div>` : ''}
                    ${bib ? `<div class="detail-row">🎽 Dossard : <span>${bib}</span></div>` : ''}
                    <div class="detail-actions">
                        ${race.strava ? `<a class="detail-btn strava" href="${race.strava}" target="_blank">STRAVA ↗</a>` : ''}
                    </div>
                </div>
            </div>
        `;

        // Toggle expand on click
        card.addEventListener('click', function(e) {
            if (e.target.closest('a') || e.target.closest('button')) return;
            const wasExpanded = card.classList.contains('expanded');
            // Close all others in same timeline
            timelineDiv.querySelectorAll('.race-card.expanded').forEach(c => c.classList.remove('expanded'));
            if (!wasExpanded) {
                card.classList.add('expanded');
                if (isPR) burstConfetti(card);
            }
        });

        item.appendChild(card);
        timelineDiv.appendChild(item);
    });

    // ── Animate items into view via IntersectionObserver ──
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

    root.querySelectorAll('.race-item').forEach(item => observer.observe(item));
}

// ── Filters ──
let activeFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        activeFilter = this.dataset.dist;
        render(activeFilter);
    });
});

// ── Open bib from timeline (bridge to index.html modal) ──
function openBibFromTimeline(e, date) {
    e.stopPropagation();
    // Store the date and redirect to index.html with hash
    sessionStorage.setItem('openBibDate', date);
    window.location.href = 'index.html#openbib=' + date;
}

// ── Confetti burst ─────────────────────────────────────────────────────────
function burstConfetti(originEl) {
    const rect = originEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    const COLORS = [
        '#ffd700','#ff006e','#00fff9','#bc13fe','#00ff88',
        '#ff6b35','#fff','#ffd700','#ffec5c','#f9a8d4'
    ];
    const COUNT = 52;

    for (let i = 0; i < COUNT; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-particle';

        // Random shape: rect or circle
        const isCircle = Math.random() < 0.35;
        const size = 5 + Math.random() * 7;
        el.style.width  = size + 'px';
        el.style.height = isCircle ? size + 'px' : (size * 0.45) + 'px';
        el.style.borderRadius = isCircle ? '50%' : '2px';
        el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];

        // Start position: origin center
        el.style.left = cx + 'px';
        el.style.top  = cy + 'px';

        // Random trajectory
        const angle  = (Math.random() * 360) * Math.PI / 180;
        const dist   = 80 + Math.random() * 220;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist - (60 + Math.random() * 80); // bias upward
        const rot = (-360 + Math.random() * 720) + 'deg';
        const dur = 0.7 + Math.random() * 0.7;

        el.style.setProperty('--tx', tx + 'px');
        el.style.setProperty('--ty', ty + 'px');
        el.style.setProperty('--rot', rot);
        el.style.animationDuration = dur + 's';

        // Small stagger
        el.style.animationDelay = (Math.random() * 0.12) + 's';

        document.body.appendChild(el);
        setTimeout(() => el.remove(), (dur + 0.2) * 1000);
    }
}

// Initial render
render('all');
