    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --neon-cyan: #00fff9;
            --neon-purple: #bc13fe;
            --neon-orange: #ff6b35;
            --neon-pink: #ff006e;
            --neon-green: #00ff88;
            --neon-gold: #ffd700;
        }

        body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0f; color: white; overflow-x: hidden; }

        .animated-bg { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 0; background: radial-gradient(ellipse at top, #1a0f2e 0%, #0a0a0f 50%); }
        .animated-bg::before { content: ''; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background: radial-gradient(circle at 20% 50%, rgba(188,19,254,0.12) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(0,255,249,0.12) 0%, transparent 50%), radial-gradient(circle at 60% 10%, rgba(255,107,53,0.08) 0%, transparent 50%); animation: rotate 20s linear infinite; }
        @keyframes rotate { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

        .grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.03; z-index: 1; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }

        .neon-border { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--neon-cyan) 0%, var(--neon-purple) 25%, var(--neon-pink) 50%, var(--neon-orange) 75%, var(--neon-cyan) 100%); background-size: 200% 100%; animation: gradientSlide 4s linear infinite; z-index: 1000; box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-purple); }
        @keyframes gradientSlide { 0%{background-position:0%} 100%{background-position:200%} }

        .content { position: relative; z-index: 2; max-width: 1400px; margin: 0 auto; padding: 0 2rem; }

        .main-title { font-family: 'Orbitron', sans-serif; font-size: clamp(1.6rem, 4vw, 3.2rem); font-weight: 900; background: linear-gradient(135deg, #00ff88 0%, #00fff9 50%, #bc13fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.06em; filter: drop-shadow(0 0 20px rgba(0,255,136,0.6)) drop-shadow(0 0 40px rgba(0,255,249,0.4)); }

        .glass-card { background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; position: relative; overflow: hidden; }

        .back-btn { background: linear-gradient(135deg, rgba(0,255,249,0.15), rgba(188,19,254,0.15)); backdrop-filter: blur(20px); border: 2px solid rgba(0,255,249,0.4); color: #00fff9; padding: 0.6rem 1.5rem; border-radius: 12px; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.08em; cursor: pointer; transition: all 0.4s; text-decoration: none; display: inline-block; box-shadow: 0 0 20px rgba(0,255,249,0.3); }
        .back-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,255,249,0.5); }

        .home-btn-fixed { position: fixed; top: 20px; left: 20px; z-index: 999; width: 46px; height: 46px; border-radius: 14px; background: linear-gradient(135deg, rgba(0,255,249,0.15), rgba(188,19,254,0.15)); border: 1.5px solid rgba(0,255,249,0.4); display: flex; align-items: center; justify-content: center; text-decoration: none; backdrop-filter: blur(20px); box-shadow: 0 0 18px rgba(0,255,249,0.25); transition: all 0.3s; }
        .home-btn-fixed:hover { transform: scale(1.15); box-shadow: 0 0 30px rgba(0,255,249,0.55); }

        .fade-in { animation: fadeIn 0.9s ease-out forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

        /* ── MAP ── */
        #map {
            width: 100%;
            height: 580px;
            border-radius: 20px;
            border: 1px solid rgba(0,255,249,0.2);
            box-shadow: 0 0 40px rgba(0,255,249,0.08), 0 0 80px rgba(188,19,254,0.06);
            z-index: 1;
        }

        /* Dark tile filter */
        .leaflet-tile { filter: brightness(0.45) saturate(0.3) hue-rotate(200deg); }
        .leaflet-container { background: #0a0a14; }

        /* Custom popup */
        .leaflet-popup-content-wrapper {
            background: rgba(10,10,20,0.97) !important;
            border: 1px solid rgba(0,255,249,0.3) !important;
            border-radius: 16px !important;
            box-shadow: 0 0 30px rgba(0,255,249,0.2), 0 0 60px rgba(188,19,254,0.1) !important;
            color: white !important;
            padding: 0 !important;
            min-width: 280px;
        }
        .leaflet-popup-content { margin: 0 !important; width: auto !important; }
        .leaflet-popup-tip { background: rgba(10,10,20,0.97) !important; }
        .leaflet-popup-close-button { color: rgba(0,255,249,0.7) !important; font-size: 18px !important; top: 10px !important; right: 12px !important; }
        .leaflet-popup-close-button:hover { color: #00fff9 !important; }

        /* Popup content styles */
        .popup-header { padding: 14px 16px 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
        .popup-city { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 800; color: #00fff9; margin-bottom: 2px; }
        .popup-count { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; }
        .popup-races { padding: 8px 0; max-height: 320px; overflow-y: auto; }
        .popup-races::-webkit-scrollbar { width: 4px; }
        .popup-races::-webkit-scrollbar-thumb { background: rgba(0,255,249,0.3); border-radius: 4px; }
        .popup-race { padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.2s; }
        .popup-race:hover { background: rgba(255,255,255,0.04); }
        .popup-race:last-child { border-bottom: none; }
        .popup-race-name { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.9); margin-bottom: 4px; line-height: 1.3; }
        .popup-race-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .popup-tag { font-size: 0.62rem; padding: 2px 7px; border-radius: 6px; font-weight: 600; letter-spacing: 0.06em; }
        .tag-date { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.45); }
        .tag-dist { color: white; font-weight: 700; }
        .tag-10k { background: rgba(0,255,136,0.18); color: #00ff88; }
        .tag-21k { background: rgba(0,255,249,0.18); color: #00fff9; }
        .tag-42k { background: rgba(188,19,254,0.22); color: #d966ff; }
        .tag-other { background: rgba(255,107,53,0.18); color: #ff8855; }
        .tag-time { background: rgba(255,107,53,0.12); color: var(--neon-orange); }
        .tag-class { background: rgba(188,19,254,0.12); color: #cc66ff; }
        .tag-record { background: rgba(255,107,53,0.25); color: #ff6b35; border: 1px solid rgba(255,107,53,0.4); }
        .strava-link { display: inline-flex; align-items: center; gap: 4px; font-size: 0.62rem; color: #FC4C02; text-decoration: none; font-weight: 700; padding: 2px 7px; border-radius: 6px; background: rgba(252,76,2,0.12); border: 1px solid rgba(252,76,2,0.3); transition: all 0.2s; }
        .strava-link:hover { background: rgba(252,76,2,0.25); }

        /* ── Filter bar ── */
        .filter-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .map-filter { padding: 0.45rem 1rem; border-radius: 10px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; transition: all 0.3s; border: 1.5px solid; background: transparent; color: rgba(255,255,255,0.45); border-color: rgba(255,255,255,0.15); }
        .map-filter.active { color: white; }
        .map-filter.f-all.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); color: white; }
        .map-filter.f-10k.active { background: rgba(0,255,136,0.15); border-color: rgba(0,255,136,0.5); color: #00ff88; }
        .map-filter.f-21k.active { background: rgba(0,255,249,0.15); border-color: rgba(0,255,249,0.5); color: #00fff9; }
        .map-filter.f-42k.active { background: rgba(188,19,254,0.15); border-color: rgba(188,19,254,0.5); color: #cc66ff; }
        .map-filter.f-record.active { background: rgba(255,107,53,0.15); border-color: rgba(255,107,53,0.5); color: #ff6b35; }
        .map-filter:hover:not(.active) { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }

        /* ── Stat pills ── */
        .stat-pill { display: flex; flex-direction: column; align-items: center; padding: 0.7rem 1.2rem; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .stat-pill-val { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 800; }
        .stat-pill-label { font-size: 0.6rem; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; margin-top: 2px; }

        /* ── Legend ── */
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .content { padding: 0 0.75rem; }
            .main-title { font-size: 1.4rem; }
            #map { height: 420px; border-radius: 14px; }
            .back-btn { font-size: 0.68rem; padding: 0.45rem 0.8rem; }
            .home-btn-fixed { top: 12px; left: 12px; width: 40px; height: 40px; }
            .stat-pill { padding: 0.5rem 0.7rem; }
            .stat-pill-val { font-size: 1rem; }
            .py-20 { padding-top: 3.5rem !important; padding-bottom: 3.5rem !important; }

        /* Leaflet attribution dark */
        .leaflet-control-attribution { background: rgba(10,10,20,0.8) !important; color: rgba(255,255,255,0.3) !important; font-size: 9px !important; }
        .leaflet-control-attribution a { color: rgba(255,255,255,0.4) !important; }
        .leaflet-control-zoom a { background: rgba(10,10,25,0.9) !important; color: rgba(0,255,249,0.8) !important; border-color: rgba(0,255,249,0.2) !important; }

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function distClass(km) {
        if (km <= 10) return { cls: 'tag-10k', label: km+'km', color: '#00ff88' };
        if (km >= 42) return { cls: 'tag-42k', label: '42.2km', color: '#bc13fe' };
        if (km >= 21 && km < 22) return { cls: 'tag-21k', label: '21.1km', color: '#00fff9' };
        return { cls: 'tag-other', label: km+'km', color: '#ff8855' };
    }

    function markerColor(loc) {
        const hasRecord = loc.races.some(r => r.record);
        if (hasRecord) return '#ffd700';
        const kms = loc.races.map(r => r.km);
        if (kms.some(k => k >= 42)) return '#bc13fe';
        if (kms.some(k => k >= 21 && k < 40)) return '#00fff9';
        if (kms.every(k => k <= 10)) return '#00ff88';
        return '#ff8855';
    }

    function buildPopup(loc) {
        const count = loc.races.length;
        const hasRecord = loc.races.some(r => r.record);
        const sorted = [...loc.races].sort((a,b) => b.date.localeCompare(a.date));

        const racesHTML = sorted.map(r => {
            const dc = distClass(r.km);
            const pct = (() => {
                const [pos, tot] = r.classement.split('/').map(Number);
                return ((pos/tot)*100).toFixed(1)+'%';
            })();
            return `
            <div class="popup-race">
                <div class="popup-race-name">${r.course}${r.record ? ' <span style="color:#ffd700;font-size:0.7rem;">★ RP</span>': ''}${r.virtual ? ' <span style="color:rgba(255,255,255,0.35);font-size:0.65rem;">(virtuel)</span>': ''}</div>
                <div class="popup-race-meta">
                    <span class="popup-tag tag-date">${r.date}</span>
                    <span class="popup-tag ${dc.cls}">${dc.label}</span>
                    <span class="popup-tag tag-time">${r.perf}</span>
                    <span class="popup-tag tag-class">top ${pct}</span>
                    ${r.strava ? `<a href="${r.strava}" target="_blank" class="strava-link">${STRAVA_SVG} Strava</a>
                <a href="comparaison.html" class="back-btn" style="background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,165,0,0.2));border-color:rgba(255,215,0,0.4);color:#ffd700;box-shadow:0 0 20px rgba(255,215,0,0.25);">⚡ COMPARER</a>` : ''}
                </div>
            </div>`;
        }).join('');

        return `
        <div class="popup-header">
            <div class="popup-city">${loc.pays} ${loc.ville}</div>
            <div class="popup-count">${count} course${count>1?'s':''} · ${[...new Set(loc.races.map(r=>r.date.slice(0,4)))].sort().join(', ')}</div>
        </div>
        <div class="popup-races">${racesHTML}</div>`;
    }

    // ── MARKER ICON ───────────────────────────────────────────────────────────
    function makeIcon(loc, isFiltered) {
        const col = isFiltered ? markerColor(loc) : 'rgba(255,255,255,0.15)';
        const count = loc.races.length;
        const hasRecord = loc.races.some(r => r.record);
        const size = Math.min(48, 28 + count * 2.5);
        const pulse = hasRecord && isFiltered ? `
            <div style="position:absolute;inset:-6px;border-radius:50%;border:2px solid ${col};opacity:0.5;animation:ping 1.8s ease-in-out infinite;"></div>` : '';

        const svg = `
        <div style="position:relative;width:${size}px;height:${size}px;">
            ${pulse}
            <div style="
                width:${size}px;height:${size}px;border-radius:50%;
                background:${isFiltered ? col : 'rgba(255,255,255,0.12)'};
                border:2px solid ${isFiltered ? col : 'rgba(255,255,255,0.2)'};
                box-shadow:${isFiltered ? `0 0 14px ${col}88, 0 0 30px ${col}44` : 'none'};
                display:flex;align-items:center;justify-content:center;
                font-family:'Orbitron',sans-serif;font-size:${count > 9 ? '0.6rem' : '0.7rem'};
                font-weight:800;color:${isFiltered ? '#000' : 'rgba(255,255,255,0.25)'};
                cursor:pointer;transition:all 0.3s;
            ">${count}</div>
        </div>`;

        return L.divIcon({
            html: svg,
            className: '',
            iconSize: [size, size],
            iconAnchor: [size/2, size/2],
            popupAnchor: [0, -size/2 - 4],
        });
    }

    // ── MAP INIT ──────────────────────────────────────────────────────────────
    const map = L.map('map', {
        center: [49.5, 6.3],
        zoom: 8,
        zoomControl: true,
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 18,
    }).addTo(map);

    // Pulse animation CSS
    const style = document.createElement('style');
    style.textContent = `@keyframes ping { 0%{transform:scale(1);opacity:0.5} 70%{transform:scale(1.6);opacity:0} 100%{transform:scale(1.6);opacity:0} }`;
    document.head.appendChild(style);

    let activeFilter = 'all';
    let leafletMarkers = [];

    function passesFilter(loc, filter) {
        if (filter === 'all') return true;
        if (filter === 'record') return loc.races.some(r => r.record);
        if (filter === '10k') return loc.races.some(r => r.km <= 10);
        if (filter === '21k') return loc.races.some(r => r.km > 10 && r.km < 30);
        if (filter === '42k') return loc.races.some(r => r.km >= 42);
        return true;
    }

    function renderMarkers() {
        leafletMarkers.forEach(m => m.remove());
        leafletMarkers = [];

        markers_data.forEach(loc => {
            const active = passesFilter(loc, activeFilter);
            const icon = makeIcon(loc, active);
            const m = L.marker([loc.lat, loc.lng], { icon, zIndexOffset: active ? 100 : 0 })
                .bindPopup(buildPopup(loc), { maxWidth: 320, minWidth: 280 })
                .addTo(map);
            leafletMarkers.push(m);
        });
    }

    function setFilter(f, btn) {
        activeFilter = f;
        document.querySelectorAll('.map-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMarkers();
    }

    renderMarkers();

    // ── CITY LIST ─────────────────────────────────────────────────────────────
    const cityList = document.getElementById('city-list');
    const sorted_locs = [...markers_data].sort((a,b) => b.races.length - a.races.length);
    cityList.innerHTML = sorted_locs.map(loc => {
        const col = markerColor(loc);
        const hasRecord = loc.races.some(r => r.record);
        const years = [...new Set(loc.races.map(r => r.date.slice(0,4)))].sort();
        return `
        <div onclick="focusCity('${loc.ville}')" style="
            padding:0.75rem 1rem;border-radius:12px;cursor:pointer;
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
            transition:all 0.3s;
        " onmouseover="this.style.background='rgba(255,255,255,0.07)';this.style.borderColor='${col}55'"
           onmouseout="this.style.background='rgba(255,255,255,0.03)';this.style.borderColor='rgba(255,255,255,0.07)'">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
                <span style="font-weight:700;font-size:0.85rem;color:white;">${loc.pays} ${loc.ville}</span>
                <span style="font-family:'Orbitron',sans-serif;font-size:0.8rem;font-weight:800;color:${col};">${loc.races.length}</span>
            </div>
            <div style="font-size:0.62rem;color:rgba(255,255,255,0.3);">${years.join(' · ')}${hasRecord ? ' <span style="color:#ffd700;">★ RP</span>' : ''}</div>
        </div>`;
    }).join('');

    function focusCity(ville) {
        const loc = markers_data.find(l => l.ville === ville);
        if (!loc) return;
        map.setView([loc.lat, loc.lng], 13, { animate: true });
        // open popup
        const idx = markers_data.indexOf(loc);
        if (leafletMarkers[idx]) leafletMarkers[idx].openPopup();
    }
    </script>
