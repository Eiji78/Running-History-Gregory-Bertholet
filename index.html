    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00fff9;
            --neon-purple: #bc13fe;
            --neon-orange: #ff6b35;
            --neon-pink: #ff006e;
            --dark-bg: #0a0a0f;
            --card-bg: rgba(15, 15, 25, 0.8);
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0f;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: radial-gradient(ellipse at top, #1a0f2e 0%, #0a0a0f 50%);
        }

                        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(188, 19, 254, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 249, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 107, 53, 0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Neon Border Animation */
        .neon-border {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, 
                var(--neon-cyan) 0%, 
                var(--neon-purple) 25%,
                var(--neon-pink) 50%,
                var(--neon-orange) 75%,
                var(--neon-cyan) 100%);
            background-size: 200% 100%;
            animation: gradientSlide 4s linear infinite;
            z-index: 1000;
            box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-purple);
        }

        @keyframes gradientSlide {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* Main Title */
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00fff9 0%, #bc13fe 50%, #ff006e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 80px rgba(0, 255, 249, 0.5);
            letter-spacing: 0.1em;
            position: relative;
            animation: titleGlow 3s ease-in-out infinite;
            white-space: nowrap;
        }

        @keyframes titleGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 20px rgba(0, 255, 249, 0.8)) 
                        drop-shadow(0 0 40px rgba(188, 19, 254, 0.6));
            }
            50% { 
                filter: drop-shadow(0 0 30px rgba(0, 255, 249, 1)) 
                        drop-shadow(0 0 60px rgba(188, 19, 254, 0.8));
            }
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.8), rgba(0, 255, 249, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: subtitleShake 4s ease-in-out infinite;
        }

        @keyframes subtitleShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-1px); }
            20%, 40%, 60%, 80% { transform: translateX(1px); }
        }

        /* Glass Cards */
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 249, 0.1), transparent);
            transition: left 0.7s;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: rgba(0, 255, 249, 0.5);
            box-shadow: 
                0 30px 80px rgba(0, 255, 249, 0.3),
                0 0 40px rgba(188, 19, 254, 0.2),
                inset 0 0 40px rgba(0, 255, 249, 0.05);
        }

        .glass-card.clickable {
            cursor: pointer;
        }

        .glass-card.clickable:active {
            transform: translateY(-8px) scale(1.01);
        }

        /* Stat Numbers */
        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00fff9, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 249, 0.5);
            line-height: 1;
        }

        /* Filters */
        .filter-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            padding: 0.875rem 2rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 249, 0.3), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .filter-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .filter-btn:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 255, 249, 0.6);
            box-shadow: 0 10px 30px rgba(0, 255, 249, 0.3);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(0, 255, 249, 0.3), rgba(188, 19, 254, 0.3));
            border-color: var(--neon-cyan);
            color: white;
            font-weight: 700;
            box-shadow: 0 0 30px rgba(0, 255, 249, 0.5), inset 0 0 20px rgba(0, 255, 249, 0.2);
        }

        /* Table */
        .data-table {
            background: linear-gradient(135deg, rgba(15, 15, 25, 0.6), rgba(10, 10, 15, 0.8));
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            overflow: hidden;
        }

        .data-table .overflow-x-auto {
            max-height: 70vh;
            overflow-y: auto;
            overflow-x: auto;
        }


        .table-header th {
            position: sticky;
            top: 0;
            z-index: 10;
            text-align: center !important;
            background: linear-gradient(135deg, rgba(5,5,18,0.98), rgba(12,8,22,0.98));
            backdrop-filter: blur(20px);
            box-shadow: 0 2px 0 rgba(0,255,249,0.3);
        }

        .table-header {
            background: linear-gradient(135deg, rgba(0, 255, 249, 0.15), rgba(188, 19, 254, 0.15));
            border-bottom: 2px solid rgba(0, 255, 249, 0.3);
        }

        .table-row {
            border-left: 3px solid transparent;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .table-row:hover {
            background: linear-gradient(90deg, rgba(0, 255, 249, 0.08), rgba(188, 19, 254, 0.05));
            border-left-color: var(--neon-cyan);
            transform: translateX(12px);
            box-shadow: inset 0 0 20px rgba(0, 255, 249, 0.1);
        }

        .record-row {
            position: relative;
            animation: recordPulse 2.5s ease-in-out infinite;
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.05), rgba(255, 107, 53, 0.05));
        }

        @keyframes recordPulse {
            0%, 100% { 
                box-shadow: 
                    inset 0 0 20px rgba(255, 215, 0, 0.1),
                    0 0 20px rgba(255, 215, 0, 0.2);
            }
            50% { 
                box-shadow: 
                    inset 0 0 30px rgba(255, 215, 0, 0.2),
                    0 0 40px rgba(255, 215, 0, 0.4);
            }
        }

        /* Badges */
        .record-badge {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0a0f;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            box-shadow: 
                0 4px 15px rgba(255, 215, 0, 0.4),
                inset 0 1px 3px rgba(255, 255, 255, 0.3);
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { 
                box-shadow: 
                    0 4px 15px rgba(255, 215, 0, 0.4),
                    inset 0 1px 3px rgba(255, 255, 255, 0.3);
            }
            50% { 
                box-shadow: 
                    0 6px 25px rgba(255, 215, 0, 0.6),
                    inset 0 1px 3px rgba(255, 255, 255, 0.5);
            }
        }

        .distance-badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.1);
        }

        .distance-10k { 
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(0, 150, 255, 0.3));
            color: #00d9ff;
            border: 1px solid rgba(0, 217, 255, 0.4);
        }
        .distance-21k { 
            background: linear-gradient(135deg, rgba(247, 184, 1, 0.2), rgba(255, 150, 0, 0.3));
            color: #f7b801;
            border: 1px solid rgba(247, 184, 1, 0.4);
        }
        .distance-42k { 
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(255, 50, 50, 0.3));
            color: #ff6b35;
            border: 1px solid rgba(255, 107, 53, 0.4);
        }
        .distance-other { 
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 200, 100, 0.3));
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.4);
        }

        /* Pulse Indicator */
        .pulse-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 1;
            }
            50% { 
                transform: scale(1.4);
                opacity: 0.7;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, rgba(0, 255, 249, 0.5), rgba(188, 19, 254, 0.5));
            border-radius: 10px;
            border: 2px solid rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, rgba(0, 255, 249, 0.8), rgba(188, 19, 254, 0.8));
        }
        /* ── HEATMAP ────────────────────────────────────────── */
        .heatmap-wrap {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 1.5rem 1.5rem 1.2rem;
            margin-bottom: 2.5rem;
            overflow-x: auto;
        }
        .heatmap-title {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(0,255,249,0.7);
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .heatmap-grid { display:flex; gap:3px; align-items:flex-start; }
        .heatmap-month-col { display:flex; flex-direction:column; gap:3px; }
        .heatmap-month-label {
            font-size:0.58rem; color:rgba(255,255,255,0.28); text-align:center;
            margin-bottom:2px; height:10px;
        }
        .heatmap-year-label {
            font-size:0.68rem; font-weight:800; text-align:center;
            margin-bottom:2px; height:10px; letter-spacing:0.05em;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0,255,249,0.7);
        }
        .heatmap-cell {
            width:13px; height:13px; border-radius:3px;
            background:rgba(255,255,255,0.05);
            transition:transform 0.15s; position:relative; cursor:default;
        }
        .heatmap-cell:hover { transform:scale(1.6); z-index:10; }
        .heatmap-cell.has-race-10k      { background:rgba(0,210,120,0.80); box-shadow:0 0 5px rgba(0,210,120,0.5); }
        .heatmap-cell.has-race-trail    { background:rgba(255,140,50,0.80); box-shadow:0 0 5px rgba(255,140,50,0.5); }
        .heatmap-cell.has-race-semi     { background:rgba(0,180,255,0.85); box-shadow:0 0 5px rgba(0,180,255,0.5); }
        .heatmap-cell.has-race-marathon { background:rgba(200,80,255,0.85); box-shadow:0 0 5px rgba(200,80,255,0.5); }
        .heatmap-cell.is-record { outline:2px solid rgba(255,215,0,0.9); }
        .heatmap-legend { display:flex; gap:1.2rem; margin-top:0.9rem; flex-wrap:wrap; }
        .heatmap-legend-item { display:flex; align-items:center; gap:5px; font-size:0.62rem; color:rgba(255,255,255,0.45); }
        .heatmap-legend-dot { width:10px; height:10px; border-radius:2px; }
        .heatmap-tooltip {
            position:fixed; background:rgba(10,10,20,0.96);
            border:1px solid rgba(0,255,249,0.3); border-radius:8px;
            padding:7px 11px; font-size:0.7rem; color:#fff;
            pointer-events:none; z-index:9999; display:none;
            max-width:230px; line-height:1.7; backdrop-filter:blur(10px);
        }


        /* Fade In Animation */
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

            background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));

        let distanceFilter = 'all';

        let recordFilter = false;
        let bestRankFilter = false;

        function getDistanceCategory(km) {
            const distance = parseFloat(km);
            if (distance <= 10) return '10K';
            if (distance > 10 && distance < 21) return '15K-20K';
            if (distance >= 21 && distance < 22) return '21K';
            if (distance > 22 && distance < 30) return '23K-25K';
            if (distance >= 42) return '42K';
            return 'Autre';
        }

        function getDistanceClass(km) {
            const distance = parseFloat(km);
            if (distance <= 10) return 'distance-10k';
            if (distance >= 21 && distance < 22) return 'distance-21k';
            if (distance >= 42) return 'distance-42k';
            return 'distance-other';
        }

        function calculatePercentage(classement) {
            const parts = classement.split('/');
            if (parts.length !== 2) return 'N/A';
            const position = parseInt(parts[0]);
            const total = parseInt(parts[1]);
            if (isNaN(position) || isNaN(total) || total === 0) return 'N/A';
            return ((position / total) * 100).toFixed(1) + '%';
        }

        function calculateRaceVMA(tempsMoyenKm) {
            const parts = tempsMoyenKm.split(':');
            if (parts.length !== 2) return 'N/A';
            const minutes = parseInt(parts[0]);
            const seconds = parseInt(parts[1]);
            if (isNaN(minutes) || isNaN(seconds)) return 'N/A';
            const totalMinutes = minutes + (seconds / 60);
            const vma = 60 / totalMinutes;
            return vma.toFixed(2);
        }

        function filterRaces() {
            let filtered = racesData.filter(race => {
                const distCat = getDistanceCategory(race.km);
                const year = race.date.split('-')[0];
                
                const distMatch = distanceFilter === 'all' || distCat === distanceFilter;
                const yearMatch = yearFilter === 'all' || year === yearFilter;
                const recordMatch = !recordFilter || race.record === true;
                
                return distMatch && yearMatch && recordMatch;
            });

            if (bestRankFilter) {
                const bestRank = Math.min(...filtered.map(r => {
                    const [pos] = r.classement.split('/');
                    return parseInt(pos);
                }));
                filtered = filtered.filter(r => {
                    const [pos] = r.classement.split('/');
                    return parseInt(pos) === bestRank;
                });
            }

            return filtered;
        }

        function calculateStats() {
            const filtered = filterRaces();
            const totalRaces = filtered.length;
            const avgPace = filtered.reduce((sum, race) => {
                const [min, sec] = race.tempsMoyenKm.split(':');
                return sum + parseInt(min) * 60 + parseInt(sec);
            }, 0) / totalRaces / 60;

            const bestRank = Math.min(...filtered.map(r => {
                const [pos] = r.classement.split('/');
                return parseInt(pos);
            }));

            // Calcul VMA moyenne (km/h) basée sur l'allure moyenne
            // VMA = 60 / temps_par_km (en minutes)
            const vma = 60 / avgPace;

            // Calcul moyenne des pourcentages
            const avgPercentage = filtered.reduce((sum, race) => {
                const parts = race.classement.split('/');
                if (parts.length === 2) {
                    const position = parseInt(parts[0]);
                    const total = parseInt(parts[1]);
                    if (!isNaN(position) && !isNaN(total) && total !== 0) {
                        return sum + ((position / total) * 100);
                    }
                }
                return sum;
            }, 0) / totalRaces;

            return { totalRaces, avgPace, bestRank, vma, avgPercentage };
        }

        function createCharts() {
            // Préparer les données triées par date
            const sortedRaces = [...racesData].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            const labels = sortedRaces.map(r => r.date);
            const vmaData = sortedRaces.map(r => parseFloat(calculateRaceVMA(r.tempsMoyenKm)));
            const percentData = sortedRaces.map(r => {
                const perc = calculatePercentage(r.classement);
                return perc === 'N/A' ? null : parseFloat(perc);
            });
            const paceData = sortedRaces.map(r => {
                const [min, sec] = r.tempsMoyenKm.split(':');
                return parseInt(min) + (parseInt(sec) / 60);
            });

            // Calcul des moyennes
            const avgVMA = vmaData.reduce((a, b) => a + b, 0) / vmaData.length;
            const avgPercent = percentData.filter(p => p !== null).reduce((a, b) => a + b, 0) / percentData.filter(p => p !== null).length;
            const avgPace = paceData.reduce((a, b) => a + b, 0) / paceData.length;

            // Fonction pour calculer la ligne de tendance (régression linéaire)
            function calculateTrendLine(data) {
                const n = data.length;
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                
                data.forEach((y, x) => {
                    if (y !== null) {
                        sumX += x;
                        sumY += y;
                        sumXY += x * y;
                        sumX2 += x * x;
                    }
                });
                
                const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                const intercept = (sumY - slope * sumX) / n;
                
                return data.map((_, i) => slope * i + intercept);
            }

            // Calculer les lignes de tendance
            const vmaTrend = calculateTrendLine(vmaData);
            const percentTrend = calculateTrendLine(percentData.map(p => p === null ? 0 : p));
            const paceTrend = calculateTrendLine(paceData);

            // Créer des arrays de moyenne pour chaque graphique
            const vmaAvgLine = new Array(labels.length).fill(avgVMA);
            const percentAvgLine = new Array(labels.length).fill(avgPercent);
            const paceAvgLine = new Array(labels.length).fill(avgPace);

            // Configuration commune
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: true,
                        labels: {
                            color: 'rgba(255, 255, 255, 0.8)',
                            font: {
                                size: 12,
                                family: "'Space Grotesk', sans-serif"
                            },
                            boxWidth: 15,
                            padding: 15
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(10, 10, 15, 0.9)',
                        titleColor: '#00fff9',
                        bodyColor: '#ffffff',
                        borderColor: '#00fff9',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: false,
                        callbacks: {
                            title: function(context) {
                                const index = context[0].dataIndex;
                                return sortedRaces[index].course;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: 'rgba(255, 255, 255, 0.5)',
                            maxRotation: 45,
                            minRotation: 45
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        }
                    },
                    y: {
                        ticks: {
                            color: 'rgba(255, 255, 255, 0.5)'
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        }
                    }
                }
            };

            // Graphique VMA
            const vmaCtx = document.getElementById('vmaChart').getContext('2d');
            new Chart(vmaCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'VMA (km/h)',
                        data: vmaData,
                        borderColor: '#00fff9',
                        backgroundColor: 'rgba(0, 255, 249, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#00fff9',
                        pointBorderColor: '#ffffff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 6,
                        order: 1
                    }, {
                        label: 'Moyenne (' + avgVMA.toFixed(2) + ' km/h)',
                        data: vmaAvgLine,
                        borderColor: 'rgba(255, 215, 0, 0.8)',
                        borderWidth: 2,
                        borderDash: [10, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        order: 2
                    }, {
                        label: 'Tendance',
                        data: vmaTrend,
                        borderColor: 'rgba(0, 255, 136, 0.8)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        order: 3
                    }]
                },
                options: commonOptions
            });

            // Graphique Pourcentage
            const percentCtx = document.getElementById('percentChart').getContext('2d');
            new Chart(percentCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Classement (%)',
                        data: percentData,
                        borderColor: '#bc13fe',
                        backgroundColor: 'rgba(188, 19, 254, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,

<script>
// ── Bib data ─────────────────────────────────────────────────────────────────

// ── Draw bib on canvas (crumpled paper effect) ───────────────────────────────
function drawBib(race) {
    const canvas = document.getElementById('bib-canvas');
    const displayW = canvas.parentElement.offsetWidth || Math.min(340, window.innerWidth - 48);
    const displayH = displayW * 4 / 3;
    const DPR = window.devicePixelRatio || 1;
    const W = displayW, H = displayH;
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    // ── RNG déterministe par course ──
    let _s = (race.date.replace(/-/g,'') | 0) || 20190106;
    function rnd() { _s ^= _s<<13; _s ^= _s>>17; _s ^= _s<<5; return (_s>>>0)/4294967296; }

    const bibNum = BIB_NUMS[race.date];
    const km = parseFloat(race.km);

    // Couleurs par distance
    let accentH, accentS, accentL;
    if (km >= 42)      { accentH=270; accentS=60; accentL=45; }
    else if (km >= 21) { accentH=210; accentS=70; accentL=42; }
    else if (km >= 14) { accentH=22;  accentS=75; accentL=45; }
    else               { accentH=148; accentS=55; accentL=38; }
    const accent    = `hsl(${accentH},${accentS}%,${accentL}%)`;
    const accentMid = `hsl(${accentH},${accentS-10}%,${accentL+8}%)`;
    const accentLt  = `hsl(${accentH},${accentS-20}%,${accentL+18}%)`;

    // ── 1. HEIGHTMAP FROISSÉE ─────────────────────────────────────────────────
    // Grille de hauteurs pseudo-aléatoires, lissée, pour simuler les bosses du papier
    const GX=9, GY=12;
    const raw=[], sm=[];
    for (let r=0;r<=GY;r++) { raw[r]=[]; for (let c=0;c<=GX;c++) raw[r][c]=rnd(); }
    // 2 passes de lissage
    for (let pass=0;pass<2;pass++) {
        for (let r=0;r<=GY;r++) { sm[r]=[]; for (let c=0;c<=GX;c++) {
            let s=0,n=0;
            for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
                const nr=r+dr,nc=c+dc;
                if (nr>=0&&nr<=GY&&nc>=0&&nc<=GX){s+=raw[nr][nc];n++;}
            }
            sm[r][c]=s/n;
        }}
        for (let r=0;r<=GY;r++) for (let c=0;c<=GX;c++) raw[r][c]=sm[r][c];
    }

    // ── 2. FOND PAPIER : rendu des facettes avec shading ────────────────────
    // Direction lumière (haut-gauche)
    const LX=-0.7, LY=-0.5;
    for (let r=0;r<GY;r++) {
        for (let c=0;c<GX;c++) {
            const x0=(c/GX)*W, y0=(r/GY)*H, x1=((c+1)/GX)*W, y1=((r+1)/GY)*H;
            const h00=sm[r][c],h10=sm[r][c+1],h01=sm[r+1][c],h11=sm[r+1][c+1];
            const dhdx=(h10+h11-h00-h01)*0.5, dhdy=(h01+h11-h00-h10)*0.5;
            const dot=dhdx*LX+dhdy*LY;
            // luminosité [0.78 .. 1.18]
            const bright=0.98+dot*0.32;
            const base=242;
            const bv=Math.round(Math.max(140,Math.min(255,base*bright)));
            const rv=Math.min(255,bv+9),gv=Math.min(255,bv+4),bvv=Math.max(0,bv-22);
            ctx.fillStyle=`rgb(${rv},${gv},${bvv})`;
            ctx.fillRect(x0,y0,x1-x0+0.5,y1-y0+0.5);
        }
    }
    // Arrondir les coins du papier
    ctx.save();
    ctx.globalCompositeOperation='destination-in';
    ctx.beginPath(); ctx.roundRect(0,0,W,H,10); ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.restore();

    // ── 3. BRUIT FIN (grain de papier) ───────────────────────────────────────
    const ns=64;
    const ofc=document.createElement('canvas'); ofc.width=ofc.height=ns;
    const nctx=ofc.getContext('2d');
    const imd=nctx.createImageData(ns,ns);
    for (let i=0;i<imd.data.length;i+=4) {
        const v=Math.floor(rnd()*255);
        imd.data[i]=v; imd.data[i+1]=v; imd.data[i+2]=Math.max(0,v-15); imd.data[i+3]=22;
    }
    nctx.putImageData(imd,0,0);
    const pat=ctx.createPattern(ofc,'repeat');
    if (pat) { ctx.save(); ctx.fillStyle=pat; ctx.fillRect(0,0,W,H); ctx.restore(); }

    // ── 4. BANDE COULEUR EN HAUT ─────────────────────────────────────────────
    const bandH=H*0.155;
    const bg=ctx.createLinearGradient(0,0,0,bandH);
    bg.addColorStop(0,accent); bg.addColorStop(1,accentMid);
    ctx.save();
    ctx.beginPath(); ctx.roundRect(0,0,W,bandH,[10,10,0,0]);
    ctx.fillStyle=bg; ctx.fill();
    // Variation de luminosité froissée sur la bande
    for (let c=0;c<GX;c++) {
        const x0=(c/GX)*W,x1=((c+1)/GX)*W;
        const dh=(sm[0][c+1]-sm[0][c])*LX*1.2;
        const br=1.0+dh*0.25;
        ctx.globalAlpha=Math.abs(br-1)*0.45;
        ctx.fillStyle=br>1?'rgba(255,255,255,1)':'rgba(0,0,0,1)';
        ctx.fillRect(x0,0,x1-x0,bandH);
    }
    ctx.globalAlpha=1;
    // Trame horizontale discrète
    ctx.globalAlpha=0.08; ctx.strokeStyle='#fff'; ctx.lineWidth=0.6;
    for (let y=3;y<bandH;y+=4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    ctx.restore();

    // ── 5. TITRE ─────────────────────────────────────────────────────────────
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,0.96)'; ctx.textAlign='center';
    function wrapText(text,maxWidth,font){
        ctx.font=font; const words=text.split(' '),ls=[];let line='';
        for(const w of words){const t=line?line+' '+w:w;
            if(ctx.measureText(t).width>maxWidth&&line){ls.push(line);line=w;}else line=t;}
        if(line)ls.push(line);return ls;
    }
    let fs=13,titleLines=[];
    for(fs=13;fs>=9;fs--){
        titleLines=wrapText(race.course.toUpperCase(),W-80,`bold ${fs}px Arial,sans-serif`);
        if(titleLines.length<=2)break;
    }
    ctx.font=`bold ${fs}px Arial,sans-serif`;
    const lhh=fs+3,ty0=bandH*0.38-(titleLines.length*lhh)/2+lhh/2;
    titleLines.forEach((ln,i)=>ctx.fillText(ln,W/2,ty0+i*lhh));
    ctx.font='10px Arial,sans-serif'; ctx.globalAlpha=0.85;
    const d=race.date.split('-');
    ctx.fillText(race.ville.toUpperCase()+'  ·  '+d[2]+'/'+d[1]+'/'+d[0],W/2,bandH*0.82);
    ctx.restore();

    // ── 6. TROUS DE PIN ──────────────────────────────────────────────────────
    function drawPin(px,py){
        ctx.save();
        ctx.globalAlpha=0.28;ctx.fillStyle='#2a1a00';
        ctx.beginPath();ctx.arc(px+1,py+1,6,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;ctx.fillStyle='#1a0f00';
        ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();
        const rim=ctx.createRadialGradient(px-2,py-2,1,px,py,6);
        rim.addColorStop(0,'rgba(255,255,255,0.5)');rim.addColorStop(1,'rgba(80,60,20,0.5)');
        ctx.strokeStyle=rim;ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
    }
    drawPin(W*0.082,bandH*0.5); drawPin(W*0.918,bandH*0.5);

    // ── 7. BADGE DISTANCE ────────────────────────────────────────────────────
    const distLabel=km>=42?'MARATHON':km>=21?'SEMI-MARATHON':km>=14?'TRAIL':'10 KM';
    const badgeText=distLabel+'  '+km+' KM', badgeY=bandH+H*0.075;
    ctx.save();
    ctx.font='bold 10px Arial,sans-serif';ctx.textAlign='center';
    const btw=ctx.measureText(badgeText).width,bp=14,bW=btw+bp*2,bX=W/2-bW/2;
    ctx.fillStyle=accentLt;ctx.globalAlpha=0.22;
    ctx.beginPath();ctx.roundRect(bX,badgeY-13,bW,22,4);ctx.fill();
    ctx.globalAlpha=1;ctx.strokeStyle=accentMid;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.roundRect(bX,badgeY-13,bW,22,4);ctx.stroke();
    ctx.fillStyle=accent;ctx.fillText(badgeText,W/2,badgeY+1);
    ctx.restore();

    // ── 8. GRAND NUMÉRO ──────────────────────────────────────────────────────
    const numStr=String(bibNum);
    const numSize=Math.floor(W*(numStr.length<=2?0.41:numStr.length<=3?0.33:numStr.length<=4?0.25:0.19));
    const numCY=H*0.525;
    ctx.save();
    ctx.globalAlpha=0.10;ctx.fillStyle='#3a2800';
    ctx.font=`900 ${numSize}px "Arial Black",Arial,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(numStr,W/2+2,numCY+3);
    ctx.globalAlpha=1;
    ctx.fillStyle=`hsl(${accentH},${accentS+5}%,${accentL-12}%)`;
    ctx.fillText(numStr,W/2,numCY);
    ctx.restore();

    // ── 9. INFOS PERF ────────────────────────────────────────────────────────
    const infoY=H*0.80;
    ctx.save();
    ctx.strokeStyle=accentMid;ctx.globalAlpha=0.28;ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(W*0.08,infoY-H*0.04);ctx.lineTo(W*0.92,infoY-H*0.038);ctx.stroke();
    ctx.restore();
    ctx.save();ctx.textAlign='center';
    ctx.fillStyle=`hsl(${accentH},${accentS}%,${accentL-8}%)`;
    ctx.font=`bold ${Math.max(16,Math.floor(W*0.078))}px "Arial Black",Arial,sans-serif`;
    ctx.fillText(race.perf,W/2,infoY+H*0.03);
    ctx.globalAlpha=0.5;ctx.fillStyle='#4a3a20';
    ctx.font=`${Math.max(9,Math.floor(W*0.032))}px Arial,sans-serif`;
    ctx.fillText(race.tempsMoyenKm+'/km  ·  '+race.classement,W/2,infoY+H*0.075);
    ctx.restore();

    // ── 10. BANDE BASSE ──────────────────────────────────────────────────────
    const sg=ctx.createLinearGradient(0,0,W,0);
    sg.addColorStop(0,'transparent');sg.addColorStop(0.15,accent);
    sg.addColorStop(0.5,accentMid);sg.addColorStop(0.85,accent);sg.addColorStop(1,'transparent');
    ctx.save();ctx.globalAlpha=0.65;ctx.fillStyle=sg;
    ctx.beginPath();ctx.roundRect(0,H-H*0.04,W,H*0.04,[0,0,10,10]);ctx.fill();
    ctx.restore();

    // ── 11. COIN CORNÉ ───────────────────────────────────────────────────────
    const fc=W*0.085;
    ctx.save();
    ctx.globalAlpha=0.08;ctx.fillStyle='#000';
    ctx.beginPath();ctx.moveTo(W-fc,H);ctx.lineTo(W,H-fc);ctx.lineTo(W,H);ctx.closePath();ctx.fill();
    ctx.globalAlpha=0.45;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.moveTo(W-fc+2,H-2);ctx.lineTo(W-2,H-fc+2);ctx.lineTo(W-fc-2,H-fc-2);ctx.closePath();ctx.fill();
    ctx.restore();

    // ── 12. OMBRES DE BORD ───────────────────────────────────────────────────
    ctx.save();
    const er=ctx.createLinearGradient(W-12,0,W,0);
    er.addColorStop(0,'transparent');er.addColorStop(1,'rgba(0,0,0,0.07)');
    ctx.fillStyle=er;ctx.fillRect(W-12,0,12,H);
    const eb=ctx.createLinearGradient(0,H-12,0,H);
    eb.addColorStop(0,'transparent');eb.addColorStop(1,'rgba(0,0,0,0.07)');
    ctx.fillStyle=eb;ctx.fillRect(0,H-12,W,12);
    ctx.restore();
}

// ── Open / close modal ────────────────────────────────────────────────────────
function openBib(e, date) {
    e.stopPropagation();
    // Find race data from racesData
    const race = racesData.find(r => r.date === date);
    if (!race) return;

    drawBib(race);

    document.getElementById('bib-overlay').classList.add('visible');
    document.getElementById('bib-modal').classList.add('visible');

    // Reset tilt
    document.getElementById('bib-tilt').style.transform = '';
    attachBibTilt();
}

function closeBib() {
    document.getElementById('bib-overlay').classList.remove('visible');
    document.getElementById('bib-modal').classList.remove('visible');
    removeBibTilt();
}

// ── 3D tilt (mouse + touch) ───────────────────────────────────────────────────
function attachBibTilt() {
    const tilt = document.getElementById('bib-tilt');
    const persp = document.getElementById('bib-perspective');
    const MAX = 20;

    function applyTilt(cx, cy) {
        const rect = persp.getBoundingClientRect();
        const dx = (cx - (rect.left + rect.width  / 2)) / (rect.width  / 2);
        const dy = (cy - (rect.top  + rect.height / 2)) / (rect.height / 2);
        // clamp to ±1
        const rx = Math.max(-1, Math.min(1, -dy)) * MAX;
        const ry = Math.max(-1, Math.min(1,  dx)) * MAX;
        tilt.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.02)`;
    }

    function resetTilt() {
        tilt.style.transition = 'transform .7s cubic-bezier(.25,.46,.45,.94)';
        tilt.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
        setTimeout(() => { tilt.style.transition = 'transform 0.12s ease-out'; }, 720);
    }

    tilt._mm = e => {
        tilt.style.transition = 'transform 0.12s ease-out';
        applyTilt(e.clientX, e.clientY);
    };
    tilt._ml = resetTilt;
    tilt._tm = e => { e.preventDefault(); const t = e.touches[0]; applyTilt(t.clientX, t.clientY); };
    tilt._te = resetTilt;

    // Listen on the perspective container so tilt starts before cursor enters card
    persp.addEventListener('mousemove', tilt._mm);
    persp.addEventListener('mouseleave', tilt._ml);
    persp.addEventListener('touchmove', tilt._tm, {passive:false});
    persp.addEventListener('touchend', tilt._te, {passive:true});
}

function removeBibTilt() {
    const tilt = document.getElementById('bib-tilt');
    const persp = document.getElementById('bib-perspective');
    if (tilt._mm) {
        persp.removeEventListener('mousemove', tilt._mm);
        persp.removeEventListener('mouseleave', tilt._ml);
        persp.removeEventListener('touchmove', tilt._tm);
        persp.removeEventListener('touchend', tilt._te);
        tilt.style.transform = '';
    }
}


// ── HEATMAP CALENDRIER ────────────────────────────────────────────────────────
function buildHeatmap() {
    const container = document.getElementById('heatmap-container');
    if (!container) return;
    const tooltip = document.getElementById('heatmap-tooltip');

    // Indexer les courses par date ISO
    const raceByDate = {};
    racesData.forEach(r => { raceByDate[r.date] = r; });

    const MONTHS = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
    const startYear = 2019, endYear = 2026;

    const grid = document.createElement('div');
    grid.className = 'heatmap-grid';

    for (let y = startYear; y <= endYear; y++) {
        // Vérifier si l'année a au moins une course
        const yearHasRaces = racesData.some(r => r.date.startsWith(String(y)));

        // Toujours afficher le marqueur d'année (colonne label seule si janvier vide)
        let yearLabelAdded = false;

        for (let m = 0; m < 12; m++) {
            // Nombre de jours dans ce mois
            const daysInMonth = new Date(y, m + 1, 0).getDate();

            // Chercher les courses de ce mois
            const monthRaces = [];
            for (let d = 1; d <= daysInMonth; d++) {
                const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if (raceByDate[iso]) monthRaces.push(raceByDate[iso]);
            }

            // Si pas de course ET pas encore affiché le label année → colonne label seule
            if (monthRaces.length === 0 && m !== 0) continue;

            const col = document.createElement('div');
            col.className = 'heatmap-month-col';

            // Label
            const label = document.createElement('div');
            if (!yearLabelAdded) {
                label.className = 'heatmap-year-label';
                label.textContent = String(y);
                yearLabelAdded = true;
            } else {
                label.className = 'heatmap-month-label';
                label.textContent = MONTHS[m];
            }
            col.appendChild(label);

            if (monthRaces.length === 0) {
                // Colonne vide juste pour afficher l'année
                grid.appendChild(col);
                continue;
            }

            // Ignorer les mois sans course
            if (monthRaces.length === 0) continue;

            monthRaces.forEach(race => {
                    const cell = document.createElement('div');
                    const km = parseFloat(race.km);
                    let cls = km >= 42 ? 'has-race-marathon' : km >= 21 ? 'has-race-semi' : km >= 14 ? 'has-race-trail' : 'has-race-10k';
                    cell.className = 'heatmap-cell ' + cls + (race.record ? ' is-record' : '');

                    // Tooltip
                    cell.addEventListener('mouseenter', e => {
                        const d = race.date.split('-');
                        tooltip.innerHTML =
                            `<strong style="color:var(--neon-cyan)">${race.course}</strong><br>` +
                            `📅 ${d[2]}/${d[1]}/${d[0]}<br>` +
                            `📏 ${race.km} km &nbsp;·&nbsp; ⏱ ${race.perf}<br>` +
                            `🏁 ${race.classement} &nbsp;·&nbsp; 👟 ${race.tempsMoyenKm}/km` +
                            (race.record ? `<br><span style="color:rgba(255,215,0,0.9)">⭐ Record Personnel</span>` : '');
                        tooltip.style.display = 'block';
                    });
                    cell.addEventListener('mousemove', e => {
                        tooltip.style.left = (e.clientX + 14) + 'px';
                        tooltip.style.top  = (e.clientY - 10) + 'px';
                    });
                    cell.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

                    col.appendChild(cell);
                });
            grid.appendChild(col);
        }
    }
    container.appendChild(grid);
}

buildHeatmap();
// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBib(); });
</script>
