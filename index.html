    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00fff9;
            --neon-purple: #bc13fe;
            --neon-orange: #ff6b35;
            --neon-pink: #ff006e;
            --dark-bg: #0a0a0f;
            --card-bg: rgba(15, 15, 25, 0.8);
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0f;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: radial-gradient(ellipse at top, #1a0f2e 0%, #0a0a0f 50%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(188, 19, 254, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 249, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 107, 53, 0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Neon Border Animation */
        .neon-border {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, 
                var(--neon-cyan) 0%, 
                var(--neon-purple) 25%,
                var(--neon-pink) 50%,
                var(--neon-orange) 75%,
                var(--neon-cyan) 100%);
            background-size: 200% 100%;
            animation: gradientSlide 4s linear infinite;
            z-index: 1000;
            box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-purple);
        }

        @keyframes gradientSlide {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* Main Title */
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00fff9 0%, #bc13fe 50%, #ff006e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 80px rgba(0, 255, 249, 0.5);
            letter-spacing: 0.1em;
            position: relative;
            animation: titleGlow 3s ease-in-out infinite;
            white-space: nowrap;
        }

        @keyframes titleGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 20px rgba(0, 255, 249, 0.8)) 
                        drop-shadow(0 0 40px rgba(188, 19, 254, 0.6));
            }
            50% { 
                filter: drop-shadow(0 0 30px rgba(0, 255, 249, 1)) 
                        drop-shadow(0 0 60px rgba(188, 19, 254, 0.8));
            }
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.8), rgba(0, 255, 249, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: subtitleShake 4s ease-in-out infinite;
        }

        @keyframes subtitleShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-1px); }
            20%, 40%, 60%, 80% { transform: translateX(1px); }
        }

        /* Glass Cards */
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 249, 0.1), transparent);
            transition: left 0.7s;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: rgba(0, 255, 249, 0.5);
            box-shadow: 
                0 30px 80px rgba(0, 255, 249, 0.3),
                0 0 40px rgba(188, 19, 254, 0.2),
                inset 0 0 40px rgba(0, 255, 249, 0.05);
        }

        .glass-card.clickable {
            cursor: pointer;
        }

        .glass-card.clickable:active {
            transform: translateY(-8px) scale(1.01);
        }

        /* Stat Numbers */
        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00fff9, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 249, 0.5);
            line-height: 1;
        }

        /* Filters */
        .filter-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            padding: 0.875rem 2rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 249, 0.3), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .filter-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .filter-btn:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 255, 249, 0.6);
            box-shadow: 0 10px 30px rgba(0, 255, 249, 0.3);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(0, 255, 249, 0.3), rgba(188, 19, 254, 0.3));
            border-color: var(--neon-cyan);
            color: white;
            font-weight: 700;
            box-shadow: 0 0 30px rgba(0, 255, 249, 0.5), inset 0 0 20px rgba(0, 255, 249, 0.2);
        }

        /* Table */
        .data-table {
            background: linear-gradient(135deg, rgba(15, 15, 25, 0.6), rgba(10, 10, 15, 0.8));
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            overflow: hidden;
        }

        .table-header {
            background: linear-gradient(135deg, rgba(0, 255, 249, 0.15), rgba(188, 19, 254, 0.15));
            border-bottom: 2px solid rgba(0, 255, 249, 0.3);
        }

        .table-row {
            border-left: 3px solid transparent;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .table-row:hover {
            background: linear-gradient(90deg, rgba(0, 255, 249, 0.08), rgba(188, 19, 254, 0.05));
            border-left-color: var(--neon-cyan);
            transform: translateX(12px);
            box-shadow: inset 0 0 20px rgba(0, 255, 249, 0.1);
        }

        .record-row {
            position: relative;
            animation: recordPulse 2.5s ease-in-out infinite;
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.05), rgba(255, 107, 53, 0.05));
        }

        @keyframes recordPulse {
            0%, 100% { 
                box-shadow: 
                    inset 0 0 20px rgba(255, 215, 0, 0.1),
                    0 0 20px rgba(255, 215, 0, 0.2);
            }
            50% { 
                box-shadow: 
                    inset 0 0 30px rgba(255, 215, 0, 0.2),
                    0 0 40px rgba(255, 215, 0, 0.4);
            }
        }

        /* Badges */
        .record-badge {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0a0f;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            box-shadow: 
                0 4px 15px rgba(255, 215, 0, 0.4),
                inset 0 1px 3px rgba(255, 255, 255, 0.3);
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { 
                box-shadow: 
                    0 4px 15px rgba(255, 215, 0, 0.4),
                    inset 0 1px 3px rgba(255, 255, 255, 0.3);
            }
            50% { 
                box-shadow: 
                    0 6px 25px rgba(255, 215, 0, 0.6),
                    inset 0 1px 3px rgba(255, 255, 255, 0.5);
            }
        }

        .distance-badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.1);
        }

        .distance-10k { 
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(0, 150, 255, 0.3));
            color: #00d9ff;
            border: 1px solid rgba(0, 217, 255, 0.4);
        }
        .distance-21k { 
            background: linear-gradient(135deg, rgba(247, 184, 1, 0.2), rgba(255, 150, 0, 0.3));
            color: #f7b801;
            border: 1px solid rgba(247, 184, 1, 0.4);
        }
        .distance-42k { 
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(255, 50, 50, 0.3));
            color: #ff6b35;
            border: 1px solid rgba(255, 107, 53, 0.4);
        }
        .distance-other { 
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 200, 100, 0.3));
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.4);
        }

        /* Pulse Indicator */
        .pulse-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 1;
            }
            50% { 
                transform: scale(1.4);
                opacity: 0.7;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, rgba(0, 255, 249, 0.5), rgba(188, 19, 254, 0.5));
            border-radius: 10px;
            border: 2px solid rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, rgba(0, 255, 249, 0.8), rgba(188, 19, 254, 0.8));
        }

        /* Fade In Animation */
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ── MOBILE RESPONSIVE ─────────────────────────────────────── */
        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            body { overflow-x: hidden; }
            .main-title { font-size: 1.6rem; letter-spacing: 0.03em; }
            .subtitle { font-size: 0.7rem; letter-spacing: 0.15em; }
            .glass-card { padding: 1rem !important; }
            .stat-number { font-size: 1.8rem; }
            .progress-btn { font-size: 0.72rem; padding: 0.5rem 0.9rem; letter-spacing: 0.04em; }
            .desktop-table { display: none !important; }
            .mobile-cards { display: flex !important; flex-direction: column; gap: 0.75rem; }
            .py-20 { padding-top: 3.5rem !important; padding-bottom: 3.5rem !important; }
            .mb-20 { margin-bottom: 2rem !important; }
            .mb-16 { margin-bottom: 1.5rem !important; }
            .mb-10 { gap: 0.5rem; }
            .filter-btn { font-size: 0.68rem; padding: 0.4rem 0.8rem; white-space: nowrap; }
        }
        @media (min-width: 769px) {
            .mobile-cards { display: none !important; }
            .desktop-table { display: block !important; }
        }

        /* Carte mobile course */
        .race-mobile-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));

            border-color: rgba(255,107,53,0.45);

        .race-mobile-card-header {
            display: flex;
            justify-content: space-between;

        .race-mobile-stat {

            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .race-mobile-stat-label {
            font-size: 0.5rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .race-mobile-stat-val { font-size: 0.82rem; font-weight: 700; }

        .filter-indicator {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 255, 249, 0.8);
        }

        .progress-btn {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 200, 100, 0.3));
            backdrop-filter: blur(20px);

        .progress-btn:hover {

            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.5);
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.3), rgba(0, 200, 100, 0.4));

        let distanceFilter = 'all';
        let yearFilter = 'all';
        let recordFilter = false;
        let bestRankFilter = false;

        function getDistanceCategory(km) {
            const distance = parseFloat(km);
            if (distance <= 10) return '10K';
            if (distance > 10 && distance < 21) return '15K-20K';
            if (distance >= 21 && distance < 22) return '21K';
            if (distance > 22 && distance < 30) return '23K-25K';
            if (distance >= 42) return '42K';
            return 'Autre';
        }

        function getDistanceClass(km) {
            const distance = parseFloat(km);
            if (distance <= 10) return 'distance-10k';
            if (distance >= 21 && distance < 22) return 'distance-21k';
            if (distance >= 42) return 'distance-42k';
            return 'distance-other';
        }

        function calculatePercentage(classement) {
            const parts = classement.split('/');
            if (parts.length !== 2) return 'N/A';
            const position = parseInt(parts[0]);
            const total = parseInt(parts[1]);
            if (isNaN(position) || isNaN(total) || total === 0) return 'N/A';
            return ((position / total) * 100).toFixed(1) + '%';
        }

        function calculateRaceVMA(tempsMoyenKm) {
            const parts = tempsMoyenKm.split(':');
            if (parts.length !== 2) return 'N/A';
            const minutes = parseInt(parts[0]);
            const seconds = parseInt(parts[1]);
            if (isNaN(minutes) || isNaN(seconds)) return 'N/A';
            const totalMinutes = minutes + (seconds / 60);
            const vma = 60 / totalMinutes;
            return vma.toFixed(2);
        }

        function filterRaces() {
            let filtered = racesData.filter(race => {
                const distCat = getDistanceCategory(race.km);
                const year = race.date.split('-')[0];
                
                const distMatch = distanceFilter === 'all' || distCat === distanceFilter;
                const yearMatch = yearFilter === 'all' || year === yearFilter;
                const recordMatch = !recordFilter || race.record === true;
                
                return distMatch && yearMatch && recordMatch;
            });

            if (bestRankFilter) {
                const bestRank = Math.min(...filtered.map(r => {
                    const [pos] = r.classement.split('/');
                    return parseInt(pos);
                }));
                filtered = filtered.filter(r => {
                    const [pos] = r.classement.split('/');
                    return parseInt(pos) === bestRank;
                });
            }

            return filtered;
        }

        function calculateStats() {
            const filtered = filterRaces();
            const totalRaces = filtered.length;
            const avgPace = filtered.reduce((sum, race) => {
                const [min, sec] = race.tempsMoyenKm.split(':');
                return sum + parseInt(min) * 60 + parseInt(sec);
            }, 0) / totalRaces / 60;

            const bestRank = Math.min(...filtered.map(r => {
                const [pos] = r.classement.split('/');
                return parseInt(pos);
            }));

            // Calcul VMA moyenne (km/h) basée sur l'allure moyenne
            // VMA = 60 / temps_par_km (en minutes)
            const vma = 60 / avgPace;

            // Calcul moyenne des pourcentages
            const avgPercentage = filtered.reduce((sum, race) => {
                const parts = race.classement.split('/');
                if (parts.length === 2) {
                    const position = parseInt(parts[0]);
                    const total = parseInt(parts[1]);
                    if (!isNaN(position) && !isNaN(total) && total !== 0) {
                        return sum + ((position / total) * 100);
                    }
                }
                return sum;
            }, 0) / totalRaces;

            return { totalRaces, avgPace, bestRank, vma, avgPercentage };
        }

        function createCharts() {
            // Préparer les données triées par date
            const sortedRaces = [...racesData].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            const labels = sortedRaces.map(r => r.date);
            const vmaData = sortedRaces.map(r => parseFloat(calculateRaceVMA(r.tempsMoyenKm)));
            const percentData = sortedRaces.map(r => {
                const perc = calculatePercentage(r.classement);
                return perc === 'N/A' ? null : parseFloat(perc);
            });
            const paceData = sortedRaces.map(r => {
                const [min, sec] = r.tempsMoyenKm.split(':');
                return parseInt(min) + (parseInt(sec) / 60);
            });

            // Calcul des moyennes
            const avgVMA = vmaData.reduce((a, b) => a + b, 0) / vmaData.length;
            const avgPercent = percentData.filter(p => p !== null).reduce((a, b) => a + b, 0) / percentData.filter(p => p !== null).length;
            const avgPace = paceData.reduce((a, b) => a + b, 0) / paceData.length;

            // Fonction pour calculer la ligne de tendance (régression linéaire)
            function calculateTrendLine(data) {
                const n = data.length;
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                
                data.forEach((y, x) => {
                    if (y !== null) {
                        sumX += x;
                        sumY += y;
                        sumXY += x * y;
                        sumX2 += x * x;
                    }
                });
                
                const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                const intercept = (sumY - slope * sumX) / n;
                
                return data.map((_, i) => slope * i + intercept);
            }

            // Calculer les lignes de tendance
            const vmaTrend = calculateTrendLine(vmaData);
            const percentTrend = calculateTrendLine(percentData.map(p => p === null ? 0 : p));
            const paceTrend = calculateTrendLine(paceData);

            // Créer des arrays de moyenne pour chaque graphique
            const vmaAvgLine = new Array(labels.length).fill(avgVMA);
            const percentAvgLine = new Array(labels.length).fill(avgPercent);
            const paceAvgLine = new Array(labels.length).fill(avgPace);

            // Configuration commune
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: true,
                        labels: {
                            color: 'rgba(255, 255, 255, 0.8)',
                            font: {
                                size: 12,
                                family: "'Space Grotesk', sans-serif"
                            },
                            boxWidth: 15,
                            padding: 15
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(10, 10, 15, 0.9)',
                        titleColor: '#00fff9',
                        bodyColor: '#ffffff',
                        borderColor: '#00fff9',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: false,
                        callbacks: {
                            title: function(context) {
                                const index = context[0].dataIndex;
                                return sortedRaces[index].course;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: 'rgba(255, 255, 255, 0.5)',
                            maxRotation: 45,
                            minRotation: 45
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        }
                    },
                    y: {
                        ticks: {
                            color: 'rgba(255, 255, 255, 0.5)'
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        }
                    }
                }
            };

            // Graphique VMA
            const vmaCtx = document.getElementById('vmaChart').getContext('2d');
            new Chart(vmaCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'VMA (km/h)',
                        data: vmaData,
                        borderColor: '#00fff9',
                        backgroundColor: 'rgba(0, 255, 249, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#00fff9',
                        pointBorderColor: '#ffffff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 6,
                        order: 1
                    }, {
                        label: 'Moyenne (' + avgVMA.toFixed(2) + ' km/h)',
                        data: vmaAvgLine,
                        borderColor: 'rgba(255, 215, 0, 0.8)',
                        borderWidth: 2,
                        borderDash: [10, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        order: 2
                    }, {
                        label: 'Tendance',
                        data: vmaTrend,
                        borderColor: 'rgba(0, 255, 136, 0.8)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        order: 3
                    }]
                },
                options: commonOptions
            });

            // Graphique Pourcentage
            const percentCtx = document.getElementById('percentChart').getContext('2d');
            new Chart(percentCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Classement (%)',
                        data: percentData,
                        borderColor: '#bc13fe',
                        backgroundColor: 'rgba(188, 19, 254, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#bc13fe',
                        pointBorderColor: '#ffffff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 6,
                        order: 1
                    }, {
                        label: 'Moyenne (' + avgPercent.toFixed(1) + '%)',
                        data: percentAvgLine,
                        borderColor: 'rgba(255, 215, 0, 0.8)',
                        borderWidth: 2,
                        borderDash: [10, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        order: 2
                    }, {
                        label: 'Tendance',
                        data: percentTrend,
                        borderColor: 'rgba(0, 255, 136, 0.8)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        order: 3
                    }]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: {
                            ...commonOptions.scales.y,
                            reverse: true // Inverse l'axe Y (meilleur en haut)
                        }
                    }
                }
            });

            // Graphique Allure
            const paceCtx = document.getElementById('paceChart').getContext('2d');
            const avgPaceMin = Math.floor(avgPace);
            const avgPaceSec = Math.round((avgPace - avgPaceMin) * 60);
            new Chart(paceCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Allure (min/km)',
                        data: paceData,
                        borderColor: '#ff6b35',
                        backgroundColor: 'rgba(255, 107, 53, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#ff6b35',
                        pointBorderColor: '#ffffff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 6,
                        order: 1
                    }, {
                        label: 'Moyenne (' + avgPaceMin + ':' + String(avgPaceSec).padStart(2, '0') + ' /km)',
                        data: paceAvgLine,
                        borderColor: 'rgba(255, 215, 0, 0.8)',
                        borderWidth: 2,
                        borderDash: [10, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        order: 2
                    }, {
                        label: 'Tendance',
                        data: paceTrend,
                        borderColor: 'rgba(0, 255, 136, 0.8)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        order: 3
                    }]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: {
                            ...commonOptions.scales.y,
                            reverse: true, // Inverse l'axe Y (plus rapide en haut)
                            ticks: {
                                ...commonOptions.scales.y.ticks,
                                callback: function(value) {
                                    const min = Math.floor(value);
                                    const sec = Math.round((value - min) * 60);
                                    return min + ':' + String(sec).padStart(2, '0');
                                }
                            }
                        }
                    },
                    plugins: {
                        ...commonOptions.plugins,
                        tooltip: {
                            ...commonOptions.plugins.tooltip,
                            callbacks: {
                                ...commonOptions.plugins.tooltip.callbacks,
                                label: function(context) {
                                    const value = context.parsed.y;
                                    const min = Math.floor(value);
                                    const sec = Math.round((value - min) * 60);
                                    return 'Allure: ' + min + ':' + String(sec).padStart(2, '0') + ' /km';
                                }
                            }
                        }
                    }
                }
            });
        }
        render();
    </script>

                width:100%; height:100%;
                border-radius:12px; display:block;
            "></canvas>
        </div>
    </div>
    <p style="text-align:center;margin-top:10px;font-size:.65rem;
        color:rgba(255,255,255,.25);letter-spacing:.1em;">
        DÉPLACER LA SOURIS SUR LE DOSSARD
    </p>
</div>

<style>
#bib-overlay.visible { display:block !important; }
#bib-modal.visible   { display:block !important; }
#bib-modal.visible #bib-tilt {
    animation: bibPop .4s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes bibPop {
    from { opacity:0; transform: perspective(900px) scale(0.7) rotateX(20deg); }
    to   { opacity:1; transform: perspective(900px) scale(1)   rotateX(0deg); }
}
</style>

<script>
// ── Bib data ─────────────────────────────────────────────────────────────────

// ── Draw bib on canvas (realistic paper) ─────────────────────────────────────
function drawBib(race) {
    const canvas = document.getElementById('bib-canvas');
    const W = 360, H = 480;
    canvas.width  = W * 2;  // retina
    canvas.height = H * 2;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);

    const bibNum = BIB_NUMS[race.date];
    const km = parseFloat(race.km);

    // ── Color scheme by distance ──
    let accentH, accentS, accentL;
    if (km >= 42)       { accentH=270; accentS=60; accentL=45; }  // purple — marathon
    else if (km >= 21)  { accentH=210; accentS=70; accentL=42; }  // blue   — semi
    else if (km >= 14)  { accentH=22;  accentS=75; accentL=45; }  // orange — trail
    else                { accentH=148; accentS=55; accentL=38; }  // green  — 10k

    const accent    = `hsl(${accentH},${accentS}%,${accentL}%)`;
    const accentMid = `hsl(${accentH},${accentS-10}%,${accentL+8}%)`;
    const accentLt  = `hsl(${accentH},${accentS-20}%,${accentL+18}%)`;

    // ── Paper background ──
    // Base cream paper
    const paperGrad = ctx.createLinearGradient(0,0,W,H);
    paperGrad.addColorStop(0,   '#faf8f3');
    paperGrad.addColorStop(0.4, '#f5f2ea');
    paperGrad.addColorStop(1,   '#ede9df');
    ctx.fillStyle = paperGrad;
    ctx.beginPath();
    ctx.roundRect(0, 0, W, H, 10);
    ctx.fill();

    // Paper grain texture (stippled)
    ctx.save();
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 1800; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        const r = Math.random() * 1.2;
        ctx.fillStyle = Math.random() > 0.5 ? '#5a4a30' : '#fff';
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // Subtle vertical fiber lines
    ctx.save();
    ctx.globalAlpha = 0.025;
    ctx.strokeStyle = '#8a7a60';
    ctx.lineWidth = 0.5;
    for (let x = 5; x < W; x += 3.5) {
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+Math.random()*1.5, H); ctx.stroke();
    }
    ctx.restore();

    // ── Top color band ──
    const bandGrad = ctx.createLinearGradient(0,0,0,72);
    bandGrad.addColorStop(0, accent);
    bandGrad.addColorStop(1, accentMid);
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(0, 0, W, 72, [10,10,0,0]);
    ctx.fillStyle = bandGrad;
    ctx.fill();
    // Subtle horizontal line texture on band
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.7;
    for (let y = 4; y < 72; y += 4) {
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    ctx.restore();

    // ── Race name in top band — word-wrap up to 2 lines ──
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.textAlign = 'center';
    const maxW = W - 80; // leave room for pin holes

    // Try to fit on one line, shrinking font if needed
    let fontSize = 13;
    ctx.font = `bold ${fontSize}px Arial, sans-serif`;
    const fullName = race.course.toUpperCase();
    
    // Word-wrap into lines
    function wrapText(text, maxWidth, font) {
        ctx.font = font;
        const words = text.split(' ');
        const lines = [];
        let line = '';
        for (const word of words) {
            const test = line ? line + ' ' + word : word;
            if (ctx.measureText(test).width > maxWidth && line) {
                lines.push(line);
                line = word;
            } else {
                line = test;
            }
        }
        if (line) lines.push(line);
        return lines;
    }

    // Start at 13px, shrink until fits in 2 lines or font hits 9px
    let lines = [];
    for (fontSize = 13; fontSize >= 9; fontSize--) {
        const font = `bold ${fontSize}px Arial, sans-serif`;
        lines = wrapText(fullName, maxW, font);
        if (lines.length <= 2) break;
    }

    ctx.font = `bold ${fontSize}px Arial, sans-serif`;
    const lineH = fontSize + 3;
    const totalH = lines.length * lineH;
    const startY = 36 - totalH / 2 + lineH / 2;
    lines.forEach((ln, i) => ctx.fillText(ln, W/2, startY + i * lineH));

    // Location + date below
    ctx.font = '10px Arial, sans-serif';
    ctx.globalAlpha = 0.85;
    const d = race.date.split('-');
    ctx.fillText(race.ville.toUpperCase() + '  ·  ' + d[2]+'/'+d[1]+'/'+d[0], W/2, 60);
    ctx.restore();

    // ── Pin holes ──
    function drawPin(x, y) {
        // Shadow
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#2a1a00';
        ctx.beginPath(); ctx.arc(x+1, y+1, 7, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        // Hole
        ctx.save();
        ctx.fillStyle = '#1a0f00';
        ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
        // Metal rim
        const rimGrad = ctx.createRadialGradient(x-2, y-2, 1, x, y, 7);
        rimGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
        rimGrad.addColorStop(1, 'rgba(80,60,20,0.6)');
        ctx.strokeStyle = rimGrad;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Inner shine
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath(); ctx.arc(x-2, y-2, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
    drawPin(28, 36);
    drawPin(W-28, 36);

    // ── Distance badge — sized to content ──
    const distLabel = km >= 42 ? 'MARATHON' : km >= 21 ? 'SEMI-MARATHON' : km >= 14 ? 'TRAIL' : '10 KM';
    const badgeText = distLabel + '  ' + km + ' KM';
    const badgeY = 90;
    ctx.save();
    ctx.font = 'bold 10px Arial, sans-serif';
    ctx.textAlign = 'center';
    const badgeTW = ctx.measureText(badgeText).width;
    const badgePad = 14;
    const badgeW = badgeTW + badgePad * 2;
    const badgeX = W/2 - badgeW/2;
    // Fill
    ctx.fillStyle = accentLt;
    ctx.globalAlpha = 0.22;
    ctx.beginPath(); ctx.roundRect(badgeX, badgeY-13, badgeW, 22, 4); ctx.fill();
    // Border
    ctx.globalAlpha = 1;
    ctx.strokeStyle = accentMid;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.roundRect(badgeX, badgeY-13, badgeW, 22, 4); ctx.stroke();
    // Text
    ctx.fillStyle = accent;
    ctx.fillText(badgeText, W/2, badgeY + 1);
    ctx.restore();

    // ── BIG BIB NUMBER ──
    const numStr = String(bibNum);
    const numLen = numStr.length;
    const numSize = numLen <= 2 ? 148 : numLen <= 3 ? 118 : numLen <= 4 ? 90 : 70;

    // Number shadow (slight depth)
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#3a2800';
    ctx.font = `900 ${numSize}px "Arial Black", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(numStr, W/2 + 3, H/2 + 10 + 3);
    ctx.restore();

    // Number itself
    ctx.save();
    ctx.font = `900 ${numSize}px "Arial Black", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Slightly desaturated dark color for the number — realistic ink
    ctx.fillStyle = `hsl(${accentH},${accentS+5}%,${accentL-12}%)`;
    ctx.fillText(numStr, W/2, H/2 + 10);
    ctx.restore();

    // ── Performance info ──
    const infoY = H - 88;

    // Separator line
    ctx.save();
    ctx.strokeStyle = accentMid;
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(24, infoY - 14); ctx.lineTo(W-24, infoY - 14); ctx.stroke();
    ctx.restore();

    // Perf + allure
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = `hsl(${accentH},${accentS}%,${accentL-8}%)`;
    ctx.font = `bold 28px "Arial Black", Arial, sans-serif`;
    ctx.fillText(race.perf, W/2, infoY + 14);

    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#4a3a20';
    ctx.font = '11px Arial, sans-serif';
    ctx.fillText(race.tempsMoyenKm + '/km  ·  ' + race.classement, W/2, infoY + 34);
    ctx.restore();

    // ── Bottom color stripe ──
    const stripeGrad = ctx.createLinearGradient(0,0,W,0);
    stripeGrad.addColorStop(0, 'transparent');
    stripeGrad.addColorStop(0.15, accent);
    stripeGrad.addColorStop(0.5, accentMid);
    stripeGrad.addColorStop(0.85, accent);
    stripeGrad.addColorStop(1, 'transparent');
    ctx.save();
    ctx.fillStyle = stripeGrad;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.roundRect(0, H-18, W, 18, [0,0,10,10]);
    ctx.fill();
    ctx.restore();

    // ── Subtle corner fold effect ──
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.moveTo(W-28, H); ctx.lineTo(W, H-28); ctx.lineTo(W, H); ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(W-26, H-2); ctx.lineTo(W-2, H-26); ctx.lineTo(W-28, H-28); ctx.closePath();
    ctx.fill();
    ctx.restore();

    // ── Paper edge shadow (right + bottom) ──
    ctx.save();
    const edgeR = ctx.createLinearGradient(W-12,0,W,0);
    edgeR.addColorStop(0,'transparent'); edgeR.addColorStop(1,'rgba(0,0,0,0.06)');
    ctx.fillStyle = edgeR; ctx.fillRect(W-12,0,12,H);
    const edgeB = ctx.createLinearGradient(0,H-12,0,H);
    edgeB.addColorStop(0,'transparent'); edgeB.addColorStop(1,'rgba(0,0,0,0.06)');
    ctx.fillStyle = edgeB; ctx.fillRect(0,H-12,W,12);
    ctx.restore();
}

// ── Open / close modal ────────────────────────────────────────────────────────
function openBib(e, date) {
    e.stopPropagation();
    // Find race data from racesData
    const race = racesData.find(r => r.date === date);
    if (!race) return;

    drawBib(race);

    document.getElementById('bib-overlay').classList.add('visible');
    document.getElementById('bib-modal').classList.add('visible');

    // Reset tilt
    document.getElementById('bib-tilt').style.transform = '';
    attachBibTilt();
}

function closeBib() {
    document.getElementById('bib-overlay').classList.remove('visible');
    document.getElementById('bib-modal').classList.remove('visible');
    removeBibTilt();
}

// ── 3D tilt (mouse + touch) ───────────────────────────────────────────────────
function attachBibTilt() {
    const tilt = document.getElementById('bib-tilt');
    const persp = document.getElementById('bib-perspective');
    const MAX = 20;

    function applyTilt(cx, cy) {
        const rect = persp.getBoundingClientRect();
        const dx = (cx - (rect.left + rect.width  / 2)) / (rect.width  / 2);
        const dy = (cy - (rect.top  + rect.height / 2)) / (rect.height / 2);
        // clamp to ±1
        const rx = Math.max(-1, Math.min(1, -dy)) * MAX;
        const ry = Math.max(-1, Math.min(1,  dx)) * MAX;
        tilt.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.02)`;
    }

    function resetTilt() {
        tilt.style.transition = 'transform .7s cubic-bezier(.25,.46,.45,.94)';
        tilt.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
        setTimeout(() => { tilt.style.transition = 'transform 0.12s ease-out'; }, 720);
    }

    tilt._mm = e => {
        tilt.style.transition = 'transform 0.12s ease-out';
        applyTilt(e.clientX, e.clientY);
    };
    tilt._ml = resetTilt;
    tilt._tm = e => { e.preventDefault(); const t = e.touches[0]; applyTilt(t.clientX, t.clientY); };
    tilt._te = resetTilt;

    // Listen on the perspective container so tilt starts before cursor enters card
    persp.addEventListener('mousemove', tilt._mm);
    persp.addEventListener('mouseleave', tilt._ml);
    persp.addEventListener('touchmove', tilt._tm, {passive:false});
    persp.addEventListener('touchend', tilt._te, {passive:true});
}

function removeBibTilt() {
    const tilt = document.getElementById('bib-tilt');
    const persp = document.getElementById('bib-perspective');
    if (tilt._mm) {
        persp.removeEventListener('mousemove', tilt._mm);
        persp.removeEventListener('mouseleave', tilt._ml);
        persp.removeEventListener('touchmove', tilt._tm);
        persp.removeEventListener('touchend', tilt._te);
        tilt.style.transform = '';
    }
}

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBib(); });
</script>

</body>
